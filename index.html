<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Estado del proyecto</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap');

  :root{
    --bg:#F6F8F8;
    --panel:#FFFFFF;
    --ink:#1E2333;
    --ink-soft:#5B6473;
    --line:#DDE2EA;
    --brand-navy:#2B2E6E;
    --brand-cyan:#22D3F5;
    --teal-soft:#E9F4F6;
    --amber:#C97C3D;
    --red:#B5504A;
    --client-bubble:#EEF1F7;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:20px;
  }
  #app{
    font-family:'Inter',sans-serif;
    color:var(--ink);
    width:100%;
    max-width:560px;
    height:660px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:16px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    box-shadow:0 1px 2px rgba(30,35,51,0.04), 0 8px 24px rgba(30,35,51,0.07);
    position:relative;
  }
  .brand-bar{
    padding:18px 18px 12px;
    display:flex;
    flex-direction:column;
    align-items:center;
    border-bottom:1px solid var(--line);
    background:var(--panel);
  }
  .brand-bar img{
    height:64px;
    width:auto;
    display:block;
  }
  .header{
    padding:10px 18px 14px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:11px;
    background:var(--panel);
  }
  .pulse-wrap{position:relative;width:10px;height:10px;flex:none;}
  .pulse-dot{width:10px;height:10px;border-radius:50%;position:relative;z-index:1;}
  .pulse-ring{position:absolute;inset:0;border-radius:50%;opacity:0.5;animation:pulse 2.2s ease-out infinite;}
  @keyframes pulse{0%{transform:scale(1);opacity:0.45;}100%{transform:scale(2.8);opacity:0;}}
  .header-text{text-align:center;}
  .proj-name{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15.5px;line-height:1.2;}
  .proj-meta{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-soft);margin-top:2px;}
  .refresh-btn{background:none;border:none;cursor:pointer;color:var(--ink-soft);width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:background .15s;flex:none;}
  .refresh-btn:hover{background:var(--bg);color:var(--ink);}
  .refresh-btn.spinning svg{animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .messages{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px;}
  .msg{max-width:82%;font-size:14px;line-height:1.5;white-space:pre-wrap;}
  .msg.assistant{align-self:flex-start;background:var(--panel);border:1px solid var(--line);padding:11px 14px;border-radius:4px 14px 14px 14px;}
  .msg.client{align-self:flex-end;background:var(--client-bubble);padding:11px 14px;border-radius:14px 4px 14px 14px;}
  .msg.error{align-self:flex-start;background:#FAEAE8;color:var(--red);border:1px solid #F0CFCC;padding:11px 14px;border-radius:4px 14px 14px 14px;}
  .msg.typing{align-self:flex-start;display:flex;gap:4px;padding:14px;}
  .typing-dot{width:6px;height:6px;border-radius:50%;background:var(--ink-soft);opacity:.5;animation:blink 1.2s infinite;}
  .typing-dot:nth-child(2){animation-delay:.2s;}
  .typing-dot:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,80%,100%{opacity:.25;}40%{opacity:.7;}}
  .suggestions{display:flex;flex-wrap:wrap;gap:8px;padding:0 18px 14px;}
  .chip{font-family:'Inter',sans-serif;font-size:12.5px;color:var(--brand-navy);background:var(--teal-soft);border:none;padding:7px 12px;border-radius:20px;cursor:pointer;transition:filter .15s;}
  .chip:hover{filter:brightness(0.96);}
  .input-bar{border-top:1px solid var(--line);padding:12px 14px;display:flex;gap:8px;align-items:flex-end;background:var(--panel);}
  .input-bar textarea{flex:1;resize:none;border:1px solid var(--line);border-radius:12px;padding:10px 12px;font-family:'Inter',sans-serif;font-size:14px;line-height:1.4;max-height:90px;outline:none;color:var(--ink);}
  .input-bar textarea:focus{border-color:var(--brand-cyan);}
  .send-btn{background:var(--brand-navy);border:none;color:white;width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none;transition:filter .15s;}
  .send-btn:hover{filter:brightness(1.15);}
  .send-btn:disabled{opacity:.4;cursor:default;}
  .footer-note{text-align:center;font-size:10.5px;color:var(--ink-soft);padding:0 0 10px;font-family:'IBM Plex Mono',monospace;}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============================================================
   CONFIGURACION — edita estas lineas para tu despliegue
   ============================================================ */
const PROXY_URL = "/api/chat";
const LOGO_PATH = "./assets/logo.png";
const STATUS_PATH = "./reports/status.json";
const DOCUMENTS = [
  { label: "Alcance acordado", path: "./reports/alcance.md" },
  { label: "Avance actual",    path: "./reports/avance.md" }
];
/* ============================================================ */

const HEALTH = {
  ontrack: {label:'En curso', color:'#2F9E6E'},
  atrisk:  {label:'Atencion requerida', color:'#C97C3D'},
  delayed: {label:'Retrasado', color:'#B5504A'}
};

var projectStatus = null;
var documentsText = "";
var messages = [];
var loading = false;
var refreshing = false;

function formatDate(iso){
  try{
    var d = new Date(iso);
    return d.toLocaleDateString('es-ES', {day:'numeric', month:'short'}) + ' - ' + d.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
  }catch(e){ return ''; }
}

function escapeHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function loadData(){
  try{
    var res = await fetch(STATUS_PATH, {cache:"no-store"});
    if(!res.ok) throw new Error("no status");
    projectStatus = await res.json();
  }catch(e){
    projectStatus = { projectName:"Proyecto", health:"ontrack", updatedAt:new Date().toISOString() };
  }

  var parts = [];
  for(var i=0;i<DOCUMENTS.length;i++){
    try{
      var r = await fetch(DOCUMENTS[i].path, {cache:"no-store"});
      if(r.ok){
        var text = await r.text();
        parts.push("## " + DOCUMENTS[i].label + "\n" + text);
      }
    }catch(e){ /* si un documento falla, seguimos con los demas */ }
  }
  documentsText = parts.join("\n\n");
}

function render(){
  var app = document.getElementById('app');
  if(!projectStatus){ app.innerHTML = ''; return; }
  var health = HEALTH[projectStatus.health] || HEALTH.ontrack;
  var suggestions = ["Como va el proyecto?", "Que falta por entregar?", "Hay algun bloqueo?"];

  var html = '';
  html += '<div class="brand-bar"><img src="' + LOGO_PATH + '" alt="Logo" onerror="this.style.display=\'none\'" /></div>';
  html += '<div class="header">';
  html += '<div class="pulse-wrap"><div class="pulse-ring" style="background:' + health.color + '"></div><div class="pulse-dot" style="background:' + health.color + '"></div></div>';
  html += '<div class="header-text"><div class="proj-name">' + escapeHtml(projectStatus.projectName) + '</div>';
  html += '<div class="proj-meta">' + health.label + ' - act. ' + formatDate(projectStatus.updatedAt) + '</div></div>';
  html += '<button class="refresh-btn' + (refreshing ? ' spinning' : '') + '" id="refreshBtn" title="Actualizar estado">';
  html += '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>';
  html += '</button></div>';

  html += '<div class="messages" id="messagesEl">';
  for(var i=0;i<messages.length;i++){
    html += '<div class="msg ' + messages[i].role + '">' + escapeHtml(messages[i].text) + '</div>';
  }
  if(loading){
    html += '<div class="msg typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
  }
  html += '</div>';

  if(messages.length <= 1){
    html += '<div class="suggestions">';
    for(var j=0;j<suggestions.length;j++){
      html += '<button class="chip" data-suggest="' + escapeHtml(suggestions[j]) + '">' + escapeHtml(suggestions[j]) + '</button>';
    }
    html += '</div>';
  }

  html += '<div class="input-bar"><textarea id="inputEl" rows="1" placeholder="Escribe tu pregunta..."></textarea>';
  html += '<button class="send-btn" id="sendBtn" ' + (loading ? 'disabled' : '') + '>';
  html += '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>';
  html += '</button></div>';
  html += '<div class="footer-note">Estado del proyecto actualizado por el equipo</div>';

  app.innerHTML = html;

  var messagesEl = document.getElementById('messagesEl');
  if(messagesEl) messagesEl.scrollTop = messagesEl.scrollHeight;

  document.getElementById('refreshBtn').addEventListener('click', refreshData);
  var inputEl = document.getElementById('inputEl');
  var sendBtn = document.getElementById('sendBtn');
  sendBtn.addEventListener('click', function(){ sendMessage(inputEl.value); });
  inputEl.addEventListener('keydown', function(e){
    if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(inputEl.value); }
  });
  document.querySelectorAll('.chip').forEach(function(chip){
    chip.addEventListener('click', function(){ sendMessage(chip.getAttribute('data-suggest')); });
  });
}

async function refreshData(){
  refreshing = true;
  render();
  await loadData();
  refreshing = false;
  messages.push({role:'assistant', text:'Actualice la informacion. Es lo mas reciente que hay en el repositorio.'});
  render();
}

async function sendMessage(text){
  if(!text || !text.trim() || loading) return;
  messages.push({role:'client', text: text.trim()});
  loading = true;
  render();

  var system = 'Eres un asistente amable que informa a un cliente externo sobre el estado de su proyecto. Responde SOLO con base en los documentos de abajo (alcance acordado y avance actual). Se breve, claro y profesional. Si te preguntan algo que no esta cubierto en estos documentos, dilo honestamente y ofrece que el equipo lo confirmara. Nunca inventes fechas, porcentajes ni detalles que no esten aqui.\n\n'
    + 'Nombre del proyecto: ' + projectStatus.projectName + '\n'
    + 'Estado general: ' + (HEALTH[projectStatus.health] || HEALTH.ontrack).label + '\n'
    + 'Ultima actualizacion: ' + formatDate(projectStatus.updatedAt) + '\n\n'
    + documentsText;

  try{
    if(PROXY_URL.indexOf("TU-WORKER") !== -1){
      throw new Error("PROXY_URL no configurado");
    }
    var response = await fetch(PROXY_URL, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        system: system,
        messages: messages.map(function(m){ return {role: m.role === 'client' ? 'user' : 'assistant', content: m.text}; })
      })
    });
    if(!response.ok){
      var errBody = "error " + response.status;
      try{ var errJson = await response.json(); errBody += ": " + JSON.stringify(errJson); }catch(e){}
      throw new Error(errBody);
    }
    var data = await response.json();
    var textBlock = null;
    if(data.content){
      for(var k=0;k<data.content.length;k++){ if(data.content[k].type === 'text'){ textBlock = data.content[k]; break; } }
    }
    var replyText = textBlock ? textBlock.text : "No pude generar una respuesta en este momento.";
    messages.push({role:'assistant', text: replyText});
  }catch(e){
    messages.push({role:'error', text:"No se pudo conectar con el asistente (" + e.message + "). Si eres del equipo: revisa que PROXY_URL este bien configurado en index.html y que el Worker este desplegado."});
  }
  loading = false;
  render();
}

(async function init(){
  await loadData();
  messages = [{role:'assistant', text:'Hola, soy el asistente de estado de ' + projectStatus.projectName + '. Puedes preguntarme sobre el avance, los entregables o el alcance acordado.'}];
  render();
})();
</script>
</body>
</html>
